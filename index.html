<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Fora da Caixa - Móveis Rústicos</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(#f5f2ee, #e8e1d9);
      color: #333;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
    }

    /* 🔥 LOGO COM HOVER */
    .brand {
      position: relative;
      cursor: pointer;
    }

    .logo-img {
      width: 80px;
      transition: 0.4s;
    }

    .brand-name {
      position: absolute;
      top: 100%;
      left: 0;
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: #8b5e3c;
      opacity: 0;
      transform: translateY(-10px);
      transition: 0.4s;
      white-space: nowrap;
    }

    .brand:hover .logo-img {
      transform: translateY(-10px) scale(0.95);
      opacity: 0.3;
    }

    .brand:hover .brand-name {
      opacity: 1;
      transform: translateY(10px);
    }

    nav a {
      margin-left: 25px;
      text-decoration: none;
      color: #555;
      font-weight: 500;
      position: relative;
    }

    nav a::after {
      content: "";
      width: 0%;
      height: 2px;
      background: #8b5e3c;
      position: absolute;
      bottom: -5px;
      left: 0;
      transition: 0.3s;
    }

    nav a:hover::after {
      width: 100%;
    }

    /* HERO */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px;
      animation: slideUp 1s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .hero-text {
      max-width: 500px;
    }

    .hero-text h2 {
      font-size: 48px;
      font-family: 'Playfair Display', serif;
      color: #2c1e14;
    }

    .hero-text p {
      margin: 20px 0;
      color: #666;
    }

    .btn {
      background-color: #8b5e3c;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      margin-right: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .hero img {
      width: 420px;
      border-radius: 20px;
      transition: 0.4s;
    }

    .hero img:hover {
      transform: scale(1.03);
    }

    /* CARDS */
    .cards {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 200px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin-top: 10px;
      font-size: 18px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #3e2f23;
      color: white;
      margin-top: 40px;
    }

    /* 📱 RESPONSIVO */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 10px;
      }

      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero img {
        width: 100%;
        margin-top: 20px;
      }

      .cards {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="brand">
    <img src="https://cdn.discordapp.com/attachments/1445477100432654540/1491603401270886480/image.png" class="logo-img">
    <div class="brand-name">Fora da Caixa</div>
  </div>

  <nav>
    <a href="#">Início</a>
    <a href="#">Projetos</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-text">
    <h2>Móveis Rústicos e Planejados</h2>
    <p>Transformamos madeira em peças únicas para o seu ambiente.</p>
    <a href="#" class="btn">Solicitar Orçamento</a>
    <a href="#" class="btn" style="background:#e0d6cc;color:#3e2f23;">Ver Projetos</a>
  </div>

  <img src="https://m.media-amazon.com/images/I/71nsomVpEyL._AC_SY300_SX300_QL70_ML2_.jpg">
</section>

<section class="cards">
  <div class="card">
    <img src="https://http2.mlstatic.com/D_NQ_NP_2X_803968-MLB97768909426_112025-F.webp">
    <h3>Mesas Rústicas</h3>
  </div>

  <div class="card">
    <img src="https://m.media-amazon.com/images/I/61YTOISMckL._AC_SY300_SX300_QL70_ML2_.jpg">
    <h3>Prateleiras</h3>
  </div>

  <div class="card">
    <img src="https://th.bing.com/th/id/OIP.rno7H0bdTrlrb7syhIoUnwHaHa?w=209&h=209&c=7&r=0&o=7&pid=1.7&rm=3">
    <h3>Móveis Planejados</h3>
  </div>
</section>

<footer>
  <p>© 2026 - Fora da Caixa</p>
</footer>

</body>
</html>
