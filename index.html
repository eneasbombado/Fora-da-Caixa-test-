<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Fora da Caixa - Móveis Rústicos</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f5f2ee;
      color: #333;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 60px;
      align-items: center;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      color: #3e2f23;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #555;
      font-weight: 500;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px;
    }

    .hero-text {
      max-width: 500px;
    }

    .hero-text h2 {
      font-size: 48px;
      font-family: 'Playfair Display', serif;
      color: #2c1e14;
    }

    .hero-text p {
      margin: 20px 0;
      color: #666;
    }

    .btn {
      background-color: #8b5e3c;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      margin-right: 10px;
    }

    .hero img {
      width: 400px;
      border-radius: 20px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 200px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin-top: 10px;
      font-size: 18px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #3e2f23;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>Fora da Caixa</h1>
  <nav>
    <a href="#">Início</a>
    <a href="#">Projetos</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-text">
    <h2>Móveis Rústicos e Planejados</h2>
    <p>Transformamos madeira em peças únicas para o seu ambiente.</p>
    <a href="#" class="btn">Solicitar Orçamento</a>
    <a href="#" class="btn" style="background:#ccc;color:#333;">Ver Projetos</a>
  </div>

  <img src="https://m.media-amazon.com/images/I/71nsomVpEyL._AC_SY300_SX300_QL70_ML2_.jpg">
</section>

<section class="cards">
  <div class="card">
    <img src="https://http2.mlstatic.com/D_NQ_NP_2X_803968-MLB97768909426_112025-F.webp" />
    <h3>Mesas Rústicas</h3>
  </div>

  <div class="card">
    <img src="https://m.media-amazon.com/images/I/61YTOISMckL._AC_SY300_SX300_QL70_ML2_.jpg" />
    <h3>Prateleiras</h3>
  </div>

  <div class="card">
    <img src="https://th.bing.com/th/id/OIP.rno7H0bdTrlrb7syhIoUnwHaHa?w=209&h=209&c=7&r=0&o=7&pid=1.7&rm=3" />
    <h3>Móveis Planejados</h3>
  </div>
</section>

<footer>
  <p>© 2026 - Fora da Caixa</p>
</footer>

</body>
</html>
